<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сигнал — ШАРОДУВЫ</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
      body {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: #7f1d1d;
        color: #fff;
        font-family: Segoe UI, system-ui, sans-serif;
        text-align: center;
        padding: 16px 20px;
      }
      p {
        margin: 0;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.25;
        animation: blink 0.9s ease-in-out infinite;
        width: 100%;
        max-width: 360px;
        padding: 12px;
        border-radius: 14px;
        border: 3px solid #fff;
      }
      @keyframes blink {
        0%,
        100% {
          background: #dc2626;
          color: #fff;
        }
        50% {
          background: #fef08a;
          color: #7f1d1d;
        }
      }
      #melodyName {
        opacity: 0.9;
        font-size: 14px;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 14px 20px;
        font-size: 17px;
        font-weight: 900;
        background: #fff;
        color: #7f1d1d;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Новый заказ на сайте!</h1>
    <p>ШАРОДУВЫ Staff Alert</p>
    <p id="melodyName"></p>
    <button id="stop" type="button">🛑 ОСТАНОВИТЬ СИГНАЛ</button>

    <script src="./melodies.js"></script>
    <script>
      let ctx = null;
      let timer = null;
      let currentMelodyId = 0;

      function ensureCtx() {
        if (!ctx) {
          const Ctor = window.AudioContext || window.webkitAudioContext;
          ctx = new Ctor();
        }
        void ctx.resume();
        return ctx;
      }

      function beep(freq, durationMs, type, delayMs = 0, volume = 1) {
        const audio = ensureCtx();
        const startAt = audio.currentTime + delayMs / 1000;
        const endAt = startAt + durationMs / 1000;
        const osc = audio.createOscillator();
        const sub = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = type;
        sub.type = type;
        osc.frequency.value = freq;
        sub.frequency.value = freq * 0.5;
        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(
          Math.max(volume, 0.0002),
          startAt + 0.015
        );
        gain.gain.setValueAtTime(volume, endAt - 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, endAt);
        osc.connect(gain);
        sub.connect(gain);
        gain.connect(audio.destination);
        osc.start(startAt);
        sub.start(startAt);
        osc.stop(endAt);
        sub.stop(endAt);
      }

      function kick(delayMs = 0, freq = 55, vol = 0.9) {
        const audio = ensureCtx();
        const start = audio.currentTime + delayMs / 1000;
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq * 2, start);
        osc.frequency.exponentialRampToValueAtTime(freq, start + 0.08);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(vol, start + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.28);
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start(start);
        osc.stop(start + 0.32);
      }

      function playCycle() {
        const melody = window.getStaffAlertMelody(currentMelodyId);
        melody.play(ensureCtx(), beep, kick);
      }

      function startAlarm(melodyId) {
        stopAlarm(false);
        currentMelodyId = Number(melodyId) || 0;
        const melody = window.getStaffAlertMelody(currentMelodyId);
        document.getElementById("melodyName").textContent =
          "Мелодия: " + melody.name;
        ensureCtx();
        playCycle();
        timer = setInterval(playCycle, melody.cycleMs);
      }

      function stopAlarm(notify = true) {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        if (notify) window.staffAlertDesktop.notifyStopped();
      }

      document.getElementById("stop").onclick = () => stopAlarm(true);

      window.staffAlertDesktop.onAlarmStart((melodyId) => startAlarm(melodyId));
      window.staffAlertDesktop.onAlarmStop(() => stopAlarm(false));
    </script>
  </body>
</html>
