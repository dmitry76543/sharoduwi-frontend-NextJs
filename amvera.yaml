# Amvera — Docker + Next.js standalone (не npm run dev!)
# В UI Amvera: Конфигурация → команда запуска должна быть пустой или из этого файла.
# Переменные окружения — в панели (см. .env.example)
#
# Обязательно для писем покупателю после заказа:
#   SMTP_HOST=smtp.yandex.ru
#   SMTP_PORT=465          (не 25 — на Amvera он обычно заблокирован)
#   SMTP_SECURE=true
#   SMTP_USER=sharoduwi@yandex.ru
#   SMTP_PASS=<пароль приложения Яндекс ID>
#   ORDER_EMAIL_FROM=sharoduwi@yandex.ru
#   ORDER_EMAIL_REPLY_TO=sharoduwi@yandex.ru
#
# Staff Alert (/staff-alert):
#   STAFF_ALERT_PASSWORD=<пароль>
#   VAPID_PUBLIC_KEY=<из npm run vapid>
#   VAPID_PRIVATE_KEY=<из npm run vapid>
#   VAPID_SUBJECT=mailto:admin@sharoduwi.ru

meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  containerPort: 80
